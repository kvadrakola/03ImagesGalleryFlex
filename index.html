<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
</head>
<body>
    <div class="gallery">
        <figure>
            <img src="img/blueForest.png" alt="Shyning Blue Forest">
            <figcaption>A magical bio-luminescent forest at night, ancient trees with glowing neon blue and purple moss, ethereal atmosphere, cinematic lighting, ultra-detailed, 8k.</figcaption>
        </figure>
        
        <figure>
            <img src="img/darkCave.png" alt="Dark Cave with Glowworms">
            <figcaption>Inside a dark cave with thousands of glowing glowworms on the ceiling, creating a starry night effect, a small underground river reflecting the blue light.</figcaption>
        </figure>

                <figure>
            <img src="img/magesticStag.png" alt="Majestic Stag with Crystal Antlers">
            <figcaption>A majestic stag with glowing, crystal-like antlers walking through a dark, foggy forest, soft neon accents on its fur, fantasy art style, epic scale.</figcaption>
        </figure>

                <figure>
            <img src="img/magicalOwl.png" alt="Magical Owl with Glowing Feathers">
            <figcaption>A magical owl perched on a branch, its feathers subtly glowing with golden and purple patterns, sharp focus on the glowing eyes, dark enchanted background.</figcaption>
        </figure>

                <figure>
            <img src="img/mushroomsField.png" alt="Bioluminescent Mushrooms in a Forest">

            <figcaption>Close-up shot of alien-like bioluminescent mushrooms growing on an old tree bark, glowing with soft golden and emerald green light, macro photography, depth of field.</figcaption>
        </figure>

                <figure>
            <img src="img/mushroomsOcean.png" alt="Bioluminescent Mushrooms on Ocean Rocks">
            <figcaption>A magical bio-luminescent forest at night, ancient trees with glowing neon blue and purple moss, ethereal atmosphere, cinematic lighting, ultra-detailed, 8k.</figcaption>
        </figure>

                <figure>
            <img src="img/shyningOcean.png" alt="Shyning Ocean with Bioluminescent Waves">
            <figcaption>A night beach with bioluminescent plankton glowing bright blue in the breaking waves, starry night sky above, magical and peaceful atmosphere, photorealistic.</figcaption>
        </figure>

                <figure>
            <img src="img/waterfall.png" alt="Majestic Waterfall with Bioluminescent Falls">
            <figcaption>A hidden jungle waterfall at night where the water glows with a soft turquoise light, exotic bioluminescent plants framing the view, dreamy atmosphere.</figcaption>
        </figure>
        
        
        
    </div>
</body>
</html>
